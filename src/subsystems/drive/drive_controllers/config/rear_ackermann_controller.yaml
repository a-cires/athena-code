# Parameters for the RearAckermannController
#
# Joint ordering convention (must be respected in the config):
#   steer_joints : [front_left, front_right, rear_left, rear_right]
#                   front pair → always commanded to 0 (wheels point straight)
#                   rear  pair → Ackermann swerve angles (counter-steer toward ICR)
#   drive_joints : [front_left, front_right, rear_left, rear_right]
#                   front pair → pure Ackermann arc speed
#                   rear  pair → pure Ackermann speed (r * omega)
rear_ackermann_controller:
  steer_joints: {
    type: string_array,
    default_value: [],
    description: "Steer joint names in order [fl, fr, bl, br]. Front pair held at 0; rear pair gets swerve angles."
  }
  drive_joints: {
    type: string_array,
    default_value: [],
    description: "Drive joint names in order [fl, fr, bl, br]. Both pairs use Ackermann arc speed."
  }
  track_width: {
    type: double,
    default_value: 0.6604,
    description: "Distance between left and right wheels in meters."
  }
  wheelbase: {
    type: double,
    default_value: 0.8382,
    description: "Distance between front and rear axles in meters."
  }
  wheel_radius: {
    type: double,
    default_value: 0.254,
    description: "Radius of the wheels in meters."
  }
  max_speed: {
    type: double,
    default_value: 1.27,
    description: "Maximum linear speed in m/s."
  }
