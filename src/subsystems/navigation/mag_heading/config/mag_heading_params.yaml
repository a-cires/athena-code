# Config for mag_heading_node and calibrate_mag.
# calibrate_mag reads mag_topic from here automatically.
# After running calibrate_mag, paste the printed hard_iron / soft_iron values below.

mag_heading_node:
  ros__parameters:
    mag_topic: /zed/zed_node/imu/mag
    imu_topic: /zed/zed_node/imu/data
    frame_id: base_link


    # hard_iron: [x, y, z] bias in Tesla subtracted from raw reading
    hard_iron: [-0.00000004, -0.00000004, -0.00000075]

    # soft_iron: row-major 3x3 correction matrix (9 values)
    #   [ r00 r01 r02  r10 r11 r12  r20 r21 r22 ]
    soft_iron: [396424.63185682, -6099.08650397, -37968.68889522,
                -6099.08650397, 364405.96660082, -22546.53691954,
                -37968.68889522, -22546.53691954, 5105.15902572]

    mahony_kp: 2.0

    mahony_ki: 0.005

    mag_field_gate: 0.3
