state_estimator:
  ros__parameters:
    imu_topic: "/imu"
    gnss_topic: "/gps/fix"
    odom_topic: "/odom/ground_truth"
    output_odom_topic: "/localization/odom"

    # Frame Names
    tf_prefix: ""
    map_frame: "map"
    odom_frame: "odom"
    base_frame: "base_footprint"
    imu_frame: "imu_link"
    gnss_frame: "gnss_link"

    # Publish Rates
    publish_rate: 100.0
    tf_publish_rate: 100.0

    # IMU Noise Parameters (continuous-time spectral densities)
    accel_noise_sigma: 3.0
    gyro_noise_sigma: 10.0
    accel_bias_rw_sigma: 5.0e-2
    gyro_bias_rw_sigma: 5.0e-2

    # GNSS Parameters
    gnss_position_sigma: 0.0000001
    gnss_altitude_sigma: 0.0000001
    gnss_max_age: 0.5
    gnss_fix_quality_multiplier: 1.0
    use_robust_gnss_noise: false
    gnss_huber_k: 1.0

    # Odometry Parameters
    odom_position_sigma: 0.00001
    odom_rotation_sigma: 0.00001

    # Graph Management
    state_creation_rate: 50.0
    max_graph_states: 500

    # ISAM2 optimizer parameters
    isam2_relinearize_threshold: 0.01
    isam2_relinearize_skip: 1

    # IMU Integration Parameters
    integration_covariance: 1.0e-6
    bias_acc_omega_int: 1.0e-5

    # Initialization Parameters
    min_imu_samples_for_init: 100
    initial_velocity_sigma: 0.5
    initial_rotation_sigma: 0.1
    initial_accel_bias_sigma: 0.1
    initial_gyro_bias_sigma: 0.01

    # Buffer Configuration
    imu_buffer_max_size: 5000

    # ENU Origin
    origin_lat: 38.42391162772634
    origin_lon: -110.78490558433397
    origin_alt: 0.0