manual_arm_joint_by_joint_controller:
  position_joints: {
    type: string_array,
    default_value: [],
    description: "Specifies joints which are controlled via position.",
    read_only: true,
    validation: {
      unique<>: null,
      not_empty<>: null,
    }
  }
  velocity_joints: {
    type: string_array,
    default_value: [],
    description: "Specifies joints which are controlled via velocity.",
    read_only: true,
    validation: {
      unique<>: null,
      not_empty<>: null,
    }
  }
