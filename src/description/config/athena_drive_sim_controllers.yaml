controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController
    front_ackermann_controller:
      type: athena_drive_controllers/FrontAckermannController
    rear_ackermann_controller:
      type: athena_drive_controllers/RearAckermannController
    
    rear_steer_position_controller:
      type: position_controllers/JointGroupPositionController
    


ackermann_steering_controller:
  ros__parameters:
    # Joint names
    # this looks like its backwards, but really rear wheel names is just meaning propoulsion joint and we want to get propulsion using the front rather than rear because its smoother in sim.
    rear_wheels_names: ["propulsion_fl_joint", "propulsion_fr_joint"]

    front_wheels_names: ["steer_fl_joint", "steer_fr_joint"]
    
    # Vehicle dimensions
    wheelbase: 0.8382
    front_wheel_track: 0.6604
    rear_wheel_track: 0.6604
    front_wheels_radius: 0.254
    rear_wheels_radius: 0.254
    
    # Steering configuration
    front_steering: true
    
    # Control parameters
    use_stamped_vel: true
    open_loop: false
    reduce_wheel_speed_until_steering_reached: false
    velocity_rolling_window_size: 10
    reference_timeout: 0.2
    
    # Frame IDs
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    
    # Odometry configuration
    enable_odom_tf: false
    position_feedback: false
    
    # Covariance
    twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]


front_ackermann_controller:
  ros__parameters:
    drive_joints:
      - "propulsion_fl_joint"
      - "propulsion_fr_joint"
      - "propulsion_bl_joint"
      - "propulsion_br_joint"
    steer_joints:
      - "steer_fl_joint"
      - "steer_fr_joint"
    wheelbase: 0.8382
    track_width: 0.6604
    wheel_radius: 0.125
    # Odometry
    open_loop: false
    enable_odom_tf: false
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    velocity_rolling_window_size: 10

rear_ackermann_controller:
  ros__parameters:
    steer_joints:
      - "steer_fl_joint"
      - "steer_fr_joint"
      - "steer_bl_joint"
      - "steer_br_joint"
    drive_joints:
      - "propulsion_fl_joint"
      - "propulsion_fr_joint"
      - "propulsion_bl_joint"
      - "propulsion_br_joint"
    wheelbase: 0.8382
    track_width: 0.645
    wheel_radius: 0.125
    max_speed: 0.59
    max_steer_angle: 1.047

rear_steer_position_controller:
  ros__parameters:
    joints:
      - steer_br_joint
      - steer_bl_joint
    interface_name: position